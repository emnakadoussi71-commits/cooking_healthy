name: cooking_healthy
description: "Cooking & Healthy — application de cuisine saine et suivi nutritionnel."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0

  # State management & navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # UI
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Utils
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
